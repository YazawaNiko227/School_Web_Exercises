<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="24741631" content="Phan Đức Toàn">
    <title>Homework</title>
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <script src="../JS/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <div class="container">
        <div class="title">PHÉP TÍNH CƠ BẢN</div>
        
        <div class="form-row">
            <label class="label">Nhập số thứ 1</label>
            <input type="text" id="num1">
            <span class="required">(*)</span>
        </div>
        
        <div class="form-row">
            <label class="label">Nhập số thứ 2</label>
            <input type="text" id="num2">
            <span class="required">(*)</span>
        </div>
    
        <div class="buttons">
            <button onclick="tinh('+')">Cong</button>
            <button onclick="tinh('-')">Tru</button>
            <button onclick="tinh('*')">Nhan</button>
            <button onclick="tinh('/')">Chia</button>
            <button onclick="tinh('%')">Chia dư</button>
        </div>
    
        <div class="row">
            <span class="label">Kết quả</span>
            <input type="text" id="result" readonly>
        </div>
    </div>
    <script src="../JS/script.js"></script>
</body>

</html>
