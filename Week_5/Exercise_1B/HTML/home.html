<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazine Template - Autumn Sale</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="d-flex flex-column">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark custom-navbar py-3">
            <div class="container-fluid px-4">
                <a class="navbar-brand fw-bold" href="#">MAGAZINE TEMPLATE</a>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item dropdown px-2">
                            <a class="nav-link dropdown-toggle text-white" href="#" data-bs-toggle="dropdown">BLOCK DEMOS 1</a>
                        </li>
                        <li class="nav-item dropdown px-2">
                            <a class="nav-link dropdown-toggle text-white" href="#" data-bs-toggle="dropdown">BLOCK DEMOS 2</a>
                        </li>
                        <li class="nav-item dropdown px-2">
                            <a class="nav-link dropdown-toggle text-white-50" href="#" data-bs-toggle="dropdown">SITE TEMPLATES 1</a>
                        </li>
                        <li class="nav-item dropdown px-2">
                            <a class="nav-link dropdown-toggle text-white" href="#" data-bs-toggle="dropdown">SITE TEMPLATES 2</a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <button class="btn btn-primary btn-info text-white m-2" style="border-radius: 50px;">DOWNLOAD NOW!</button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="hero-magazine-section p-5">
        <div class="container">
            <div class="row align-items-center g-5">
                <div class="col-lg-7 text-center">
                    <div class="magazine-img-wrapper">
                        <img src="../IMG/magazin.jpg" class="img-fluid" alt="Magazine Covers">
                    </div>
                </div>
    
                <div class="col-lg-5">
                    <div class="hero-content ps-lg-5">
                        <h1 class="display-3 d-inline">Autumn Sale</h1>
                        <p>Purchase summer issues! 50% OFF</p>
                        <button class="btn btn-order px-5">Order Now</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
