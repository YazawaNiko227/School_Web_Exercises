<!doctype html>
<html lang="en">

<head>
    <title>Book Table</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="24741631" content="Phan Duc Toan">

    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div class="bg-black">
        <div class="container w-75">
            <nav class="navbar navbar-expand-sm navbar-dark">
                <div class="container d-flex align-items-center py-3">

                    <a class="navbar-brand" href="#">Feane</a>

                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item mx-3"><a class="nav-link" href="home.html">Home</a></li>
                        <li class="nav-item mx-3"><a class="nav-link" href="menu.html">Menu</a></li>
                        <li class="nav-item mx-3"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item mx-3"><a class="nav-link active" href="book.html">Book Table</a></li>
                    </ul>

                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-person text-white"></i>
                        <i class="bi bi-cart text-white"></i>
                        <i class="bi bi-search text-white"></i>
                        <button class="btn btn-warning rounded-pill px-4" data-bs-toggle="modal"
                            data-bs-target="#modalId">Order Online</button>
                    </div>
                </div>
            </nav>
        </div>
    </div>

    <div class="container w-75 my-5">
        <div class="row align-items-center">

            <div class="col-6 mt-5">
                <h1 class="mb-4">Book a Table</h1>

                <input type="text" class="form-control mb-3 p-3" placeholder="Your Name">
                <input type="text" class="form-control mb-3 p-3" placeholder="Phone Number">
                <input type="text" class="form-control mb-3 p-3" placeholder="Your Email">

                <select class="form-select mb-3 p-3">
                    <option selected>How Many Person?</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>

                <input type="date" class="form-control mb-3 p-3">

                <button class="btn btn-warning rounded-pill text-white px-5 py-2 mt-4">
                    Book Now
                </button>
            </div>

            <div class="col-6 mt-5">
                <div class="rounded overflow-hidden shadow" style="width: 600px; height: 350px;">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3458.2969705549312!2d106.68819040212927!3d10.821726084464927!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3174deb3ef536f31%3A0x8b7bb8b7c956157b!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyBDw7RuZyBuZ2hp4buHcCBUUC5IQ00!5e1!3m2!1svi!2s!4v1775297392795!5m2!1svi!2s"
                        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

        </div>
    </div>


    <div class="modal fade" id="modalId" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" role="dialog"
        aria-labelledby="modalTitleId" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title text-warning" id="modalTitleId">
                        Order
                    </h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" name="" id="" aria-describedby="helpId"
                            placeholder="" />
                    </div>
                    <div class="mb-3">
                        <label for="" class="form-label">Email</label>
                        <input type="text" class="form-control" name="" id="" aria-describedby="helpId"
                            placeholder="" />
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="" id="" />
                        <label class="form-check-label" for=""> Check me out </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-warning text-black" data-bs-dismiss="modal">
                        Close
                    </button>
                    <button type="button" class="btn btn-warning text-black">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const myModal = new bootstrap.Modal(
            document.getElementById("modalId"),
            options,
        );
    </script>



    <script src="../js/bootstrap.js"></script>
    <script src="../js/bootstrap.bundle.js"></script>
</body>

</html>
